text_sensor:
  - platform: template
    name: "Plant 1 Soil Moisture State"
    icon: mdi:water-percent
    update_interval: 30s
    lambda: |-
      if (!id(plant_1_soil_moisture).has_state()) {
        return {};
      }
      const float moisture = id(plant_1_soil_moisture).state;
      if (moisture < ${dry_percent_threshold}) {
        return {"Dry"};
      }
      if (moisture >= ${saturated_percent_threshold}) {
        return {"Saturated"};
      }
      return {"Wet"};

