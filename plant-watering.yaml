substitutions:
  device_name: plant-watering
  friendly_name: Plant Watering
  pump_max_run_time: 10s
  allow_simultaneous_pumps: "false"
  dry_percent_threshold: "35"
  saturated_percent_threshold: "90"

  # Replace these with measured values for each probe.
  # The Unit Watering sensor reports larger values when dry and smaller values when wet.
  plant_1_dry_raw: "2200"
  plant_1_wet_raw: "1700"
  plant_2_dry_raw: "2200"
  plant_2_wet_raw: "1700"
  plant_3_dry_raw: "2200"
  plant_3_wet_raw: "1700"
  plant_4_dry_raw: "2200"
  plant_4_wet_raw: "1700"
  plant_5_dry_raw: "2200"
  plant_5_wet_raw: "1700"
  plant_6_dry_raw: "2200"
  plant_6_wet_raw: "1700"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  platformio_options:
    build_flags:
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1

external_components:
  - source:
      type: local
      path: components
    components: [pbhub]

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret fallback_ap_password

captive_portal:

i2c:
  id: grove_i2c
  sda: GPIO2
  scl: GPIO1
  frequency: 100kHz
  scan: true

pbhub:
  id: watering_pbhub
  i2c_id: grove_i2c
  address: 0x61
  allow_simultaneous_pumps: ${allow_simultaneous_pumps}

sensor:
  - platform: pbhub
    pbhub_id: watering_pbhub
    channel: 0
    id: plant_1_moisture_raw
    name: "Plant 1 Soil Moisture Raw"
    icon: mdi:counter
    update_interval: 30s

  - platform: template
    id: plant_1_soil_moisture
    name: "Plant 1 Soil Moisture Percent"
    icon: mdi:water-percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: moisture
    state_class: measurement
    update_interval: 30s
    lambda: |-
      if (!id(plant_1_moisture_raw).has_state()) {
        return {};
      }
      return id(plant_1_moisture_raw).state;
    filters:
      - calibrate_linear:
          - ${plant_1_dry_raw} -> 0.0
          - ${plant_1_wet_raw} -> 100.0
      - lambda: |-
          if (x < 0.0f) return 0.0f;
          if (x > 100.0f) return 100.0f;
          return x;

  - platform: pbhub
    pbhub_id: watering_pbhub
    channel: 1
    id: plant_2_moisture_raw
    name: "Plant 2 Soil Moisture Raw"
